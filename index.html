<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>舒尔特方格 · 专注力训练</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #FFF2E6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 245, 235, 0.9);
            border-radius: 64px;
            padding: 24px 20px 32px;
            box-shadow: 0 20px 35px rgba(160, 100, 60, 0.12), 0 4px 12px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 650px;
            transition: all 0.2s ease;
        }

        /* 品牌区域：仅Logo居中，且可点击更换（隐藏按钮，双击Logo也可上传） */
        .brand {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            background: rgba(255, 249, 242, 0.7);
            border-radius: 60px;
            padding: 8px 20px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            backdrop-filter: blur(2px);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
            cursor: pointer;
            transition: 0.2s;
        }
        .brand:hover {
            background: rgba(255, 242, 230, 0.9);
        }
        .brand-logo {
            height: 48px;
            width: auto;
            border-radius: 30px;
            object-fit: contain;
        }
        /* 提示小标签（可选，鼠标悬停显示） */
        .brand::after {
            content: "⚡ 点击更换Logo";
            position: absolute;
            background: #FCE9DC;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 30px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            transform: translateY(30px);
        }
        .brand:hover::after {
            opacity: 0.7;
        }
        @media (max-width: 550px) {
            .brand-logo { height: 38px; }
        }
        @media (max-width: 420px) {
            .brand-logo { height: 32px; }
        }

        /* 统计面板 */
        .stats-panel {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 28px;
            flex-wrap: wrap;
            background: #FFF9F2;
            padding: 12px 24px;
            border-radius: 60px;
        }

        .stat-card {
            background: #FCE9DC;
            border-radius: 48px;
            padding: 8px 20px;
            text-align: center;
            flex: 1;
            min-width: 100px;
        }

        .stat-label {
            font-size: 0.85rem;
            font-weight: 500;
            color: #B97F5C;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #A66B48;
            font-variant-numeric: tabular-nums;
        }

        /* 网格 */
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            aspect-ratio: 1 / 1;
            gap: 12px;
            background: #FFF2E6;
            padding: 8px;
            border-radius: 44px;
            margin-bottom: 32px;
        }

        .card {
            background: #FFFFFF;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: 700;
            color: #7B4A2E;
            cursor: pointer;
            transition: all 0.12s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 6px 0 #EBD5C0;
            transform: translateY(-2px);
        }

        .card-correct {
            background: #C8E6B5 !important;
            transform: scale(0.92) !important;
            box-shadow: 0 2px 0 #AAC88A !important;
        }

        .card:active {
            transform: scale(0.97);
        }

        /* 按钮 */
        .button-bar {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            background: #F5E1D0;
            padding: 14px 28px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 56px;
            color: #976B48;
            cursor: pointer;
            flex: 1;
            min-width: 140px;
            box-shadow: 0 4px 6px rgba(100, 60, 20, 0.1);
        }

        .btn:active {
            transform: scale(0.96);
            background: #EAD3C0;
        }

        @media (max-width: 550px) {
            .grid { gap: 8px; }
            .card { font-size: 1.2rem; border-radius: 18px; }
            .stat-value { font-size: 1.5rem; }
            .btn { padding: 10px 18px; font-size: 1rem; min-width: 120px; }
        }

        footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.7rem;
            color: #D8BDA4;
        }
    </style>
</head>
<body>
<div class="game-container">
    <!-- 品牌区域：仅Logo（点击可更换） -->
    <div class="brand" id="brandArea">
        <img class="brand-logo" id="brandLogo" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23F7D9B5' stroke='%23A66B48' stroke-width='2'/%3E%3Ctext x='50' y='68' font-size='40' text-anchor='middle' fill='%23976B48' font-family='monospace'%3E睿%3C/text%3E%3C/svg%3E" alt="Logo">
    </div>

    <div class="stats-panel">
        <div class="stat-card">
            <div class="stat-label">⏱️ 当前用时</div>
            <div class="stat-value" id="currentTimeDisplay">0.00</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">🏆 最佳成绩</div>
            <div class="stat-value" id="bestTimeDisplay">—</div>
        </div>
    </div>

    <div class="grid" id="gridContainer"></div>

    <div class="button-bar">
        <button class="btn" id="restartBtn">🔄 重新开始</button>
        <button class="btn" id="newGameBtn">✨ 新游戏</button>
    </div>
    <footer>按顺序点击 1 → 25 | 错误无响应 | 专注力训练</footer>
</div>

<script>
    (function(){
        // ---------- DOM 元素 ----------
        const gridContainer = document.getElementById('gridContainer');
        const currentTimeSpan = document.getElementById('currentTimeDisplay');
        const bestTimeSpan = document.getElementById('bestTimeDisplay');
        const restartBtn = document.getElementById('restartBtn');
        const newGameBtn = document.getElementById('newGameBtn');
        const brandLogo = document.getElementById('brandLogo');
        const brandArea = document.getElementById('brandArea');

        // ---------- Logo 管理：自动读取之前保存的Logo ----------
        const DEFAULT_LOGO_SVG = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23F7D9B5' stroke='%23A66B48' stroke-width='2'/%3E%3Ctext x='50' y='68' font-size='40' text-anchor='middle' fill='%23976B48' font-family='monospace'%3E睿%3C/text%3E%3C/svg%3E";
        
        function loadSavedLogo() {
            const savedLogo = localStorage.getItem('user_logo');
            if (savedLogo && savedLogo.startsWith('data:image')) {
                brandLogo.src = savedLogo;
            } else {
                brandLogo.src = DEFAULT_LOGO_SVG;
            }
        }
        
        function saveLogoToLocalStorage(dataUrl) {
            localStorage.setItem('user_logo', dataUrl);
        }
        
        function uploadLogo() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const dataUrl = ev.target.result;
                    brandLogo.src = dataUrl;
                    saveLogoToLocalStorage(dataUrl);
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }
        
        // 点击Logo区域即可更换
        brandArea.addEventListener('click', uploadLogo);
        
        // 加载保存的Logo
        loadSavedLogo();

        // ---------- 游戏核心状态 ----------
        let currentNumbers = [];
        let expectedNumber = 1;
        let gameCompleted = false;
        let timerRunning = false;
        let startTime = 0;
        let timerInterval = null;
        let currentElapsedSeconds = 0;
        let bestTime = null;

        // ---------- Web Audio ----------
        let audioCtx = null;
        function getAudioContext() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            return audioCtx;
        }
        async function playBeep() {
            try {
                const ctx = getAudioContext();
                if (ctx.state === 'suspended') await ctx.resume();
                const now = ctx.currentTime;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.value = 880;
                gain.gain.value = 0.25;
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(now + 0.12);
            } catch(e) {}
        }
        async function playCelebration() {
            try {
                const ctx = getAudioContext();
                if (ctx.state === 'suspended') await ctx.resume();
                const now = ctx.currentTime;
                const notes = [523.25, 659.25, 783.99];
                for (let i = 0; i < notes.length; i++) {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = notes[i];
                    gain.gain.value = 0.2;
                    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.25 + i * 0.12);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(now + i * 0.12);
                    osc.stop(now + i * 0.12 + 0.2);
                }
                const oscLast = ctx.createOscillator();
                const gainLast = ctx.createGain();
                oscLast.type = 'triangle';
                oscLast.frequency.value = 1046.5;
                gainLast.gain.value = 0.12;
                gainLast.gain.exponentialRampToValueAtTime(0.0001, now + 0.55);
                oscLast.connect(gainLast);
                gainLast.connect(ctx.destination);
                oscLast.start(now + 0.4);
                oscLast.stop(now + 0.7);
            } catch(e) {}
        }

        function generateRandomNumbers() {
            const arr = Array.from({ length: 25 }, (_, i) => i + 1);
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        function updateBestDisplay() {
            const stored = localStorage.getItem('schulte_best_time');
            if (stored !== null && !isNaN(parseFloat(stored))) {
                bestTime = parseFloat(stored);
                bestTimeSpan.textContent = bestTime.toFixed(2) + 's';
            } else {
                bestTime = null;
                bestTimeSpan.textContent = '——';
            }
        }
        function updateTimerDisplay(seconds) {
            currentTimeSpan.textContent = seconds.toFixed(2);
        }
        function stopTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = null;
            timerRunning = false;
        }
        function startTimer() {
            if (timerInterval) stopTimer();
            startTime = performance.now();
            timerRunning = true;
            timerInterval = setInterval(() => {
                if (!timerRunning || gameCompleted) return;
                currentElapsedSeconds = (performance.now() - startTime) / 1000;
                updateTimerDisplay(currentElapsedSeconds);
            }, 30);
        }
        function finishGame() {
            if (gameCompleted) return;
            gameCompleted = true;
            if (timerRunning) stopTimer();
            const finalSeconds = currentElapsedSeconds;
            playCelebration();
            let isNewRecord = false;
            if (bestTime === null || finalSeconds < bestTime) {
                isNewRecord = true;
                bestTime = finalSeconds;
                localStorage.setItem('schulte_best_time', bestTime.toFixed(3));
                updateBestDisplay();
            }
            let message = `🎉 完成挑战！\n⏱️ 用时：${finalSeconds.toFixed(2)} 秒`;
            if (isNewRecord) message += `\n✨ 新纪录！ ✨`;
            else if (bestTime !== null) message += `\n📌 最佳纪录：${bestTime.toFixed(2)} 秒`;
            alert(message);
        }
        function handleCorrectClick(cardElement) {
            cardElement.classList.add('card-correct');
            setTimeout(() => cardElement.classList.remove('card-correct'), 150);
            playBeep();
            expectedNumber++;
            if (expectedNumber === 26) finishGame();
        }
        function onGridClick(e) {
            let target = e.target.closest('.card');
            if (!target || gameCompleted) return;
            const val = parseInt(target.getAttribute('data-value'), 10);
            if (isNaN(val) || val !== expectedNumber) return;
            if (!timerRunning && expectedNumber === 1) startTimer();
            handleCorrectClick(target);
        }
        function renderGrid() {
            gridContainer.innerHTML = '';
            for (let num of currentNumbers) {
                const card = document.createElement('div');
                card.className = 'card';
                card.textContent = num;
                card.setAttribute('data-value', num);
                gridContainer.appendChild(card);
            }
        }
        function newGame() {
            stopTimer();
            timerRunning = false;
            gameCompleted = false;
            expectedNumber = 1;
            currentElapsedSeconds = 0;
            updateTimerDisplay(0);
            currentNumbers = generateRandomNumbers();
            renderGrid();
        }
        function restartSameLayout() {
            stopTimer();
            timerRunning = false;
            gameCompleted = false;
            expectedNumber = 1;
            currentElapsedSeconds = 0;
            updateTimerDisplay(0);
            renderGrid();
        }
        function initGame() {
            updateBestDisplay();
            currentNumbers = generateRandomNumbers();
            renderGrid();
            timerRunning = false;
            gameCompleted = false;
            expectedNumber = 1;
            currentElapsedSeconds = 0;
            updateTimerDisplay(0);
        }

        function bindEvents() {
            gridContainer.addEventListener('click', onGridClick);
            restartBtn.addEventListener('click', restartSameLayout);
            newGameBtn.addEventListener('click', newGame);
        }

        function unlockAudioOnFirstTouch() {
            const handler = async () => {
                if (audioCtx && audioCtx.state === 'suspended') await audioCtx.resume();
                else if (!audioCtx) {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    if (ctx.state === 'suspended') await ctx.resume();
                    audioCtx = ctx;
                    if (audioCtx.state === 'running') await audioCtx.suspend();
                }
                document.body.removeEventListener('touchstart', handler);
                document.body.removeEventListener('mousedown', handler);
            };
            document.body.addEventListener('touchstart', handler, { once: true });
            document.body.addEventListener('mousedown', handler, { once: true });
        }

        initGame();
        bindEvents();
        unlockAudioOnFirstTouch();
    })();
</script>
</body>
</html>
