<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>字母舒尔特方格 · 睿麟素质教育</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #FFF2E6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 245, 235, 0.9);
            border-radius: 64px;
            padding: 24px 20px 32px;
            box-shadow: 0 20px 35px rgba(160, 100, 60, 0.12), 0 4px 12px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 650px;
            transition: all 0.2s ease;
        }

        /* 品牌标识（可替换为图片） */
        .brand {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.3rem;
            font-weight: 500;
            color: #A66B48;
            letter-spacing: 2px;
        }

        /* 统计面板 */
        .stats-panel {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 28px;
            flex-wrap: wrap;
            background: #FFF9F2;
            padding: 12px 24px;
            border-radius: 60px;
        }

        .stat-card {
            background: #FCE9DC;
            border-radius: 48px;
            padding: 8px 20px;
            text-align: center;
            flex: 1;
            min-width: 100px;
        }

        .stat-label {
            font-size: 0.85rem;
            font-weight: 500;
            color: #B97F5C;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #A66B48;
            font-variant-numeric: tabular-nums;
        }

        /* 5x5 网格 */
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            background: #FFF2E6;
            padding: 8px;
            border-radius: 44px;
            margin-bottom: 32px;
        }

        .card {
            background: #FFFFFF;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 700;
            color: #7B4A2E;
            cursor: pointer;
            transition: all 0.12s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 6px 0 #EBD5C0;
            transform: translateY(-2px);
            aspect-ratio: 1 / 1;
            font-family: monospace;
        }

        .card-correct {
            background: #C8E6B5 !important;
            transform: scale(0.92) !important;
            box-shadow: 0 2px 0 #AAC88A !important;
        }

        .card:active {
            transform: scale(0.97);
        }

        /* 按钮 */
        .button-bar {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            background: #F5E1D0;
            padding: 14px 28px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 56px;
            color: #976B48;
            cursor: pointer;
            flex: 1;
            min-width: 140px;
            box-shadow: 0 4px 6px rgba(100, 60, 20, 0.1);
            font-family: inherit;
        }

        .btn:active {
            transform: scale(0.96);
            background: #EAD3C0;
        }

        footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.7rem;
            color: #D8BDA4;
        }

        @media (max-width: 550px) {
            .game-container {
                padding: 16px 12px 24px;
                border-radius: 48px;
            }
            .grid {
                gap: 8px;
            }
            .card {
                font-size: 1.4rem;
                border-radius: 18px;
            }
            .stat-value {
                font-size: 1.5rem;
            }
            .stat-card {
                padding: 5px 12px;
            }
            .btn {
                padding: 10px 18px;
                font-size: 1rem;
                min-width: 120px;
            }
        }

        @media (max-width: 420px) {
            .card {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="brand">🔤 字母舒尔特方格 · 睿麟素质教育</div>

    <div class="stats-panel">
        <div class="stat-card">
            <div class="stat-label">⏱️ 当前用时</div>
            <div class="stat-value" id="currentTimeDisplay">0.00</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">🏆 最佳成绩</div>
            <div class="stat-value" id="bestTimeDisplay">—</div>
        </div>
    </div>

    <div class="grid" id="gridContainer"></div>

    <div class="button-bar">
        <button class="btn" id="restartBtn">🔄 重新开始</button>
        <button class="btn" id="newGameBtn">✨ 新游戏</button>
    </div>
    <footer>按字母顺序点击 A → Y | 错误无响应 | 睿麟素质教育</footer>
</div>

<script>
    (function(){
        // ---------- 字母集 A-Y (25个) ----------
        const ALPHABETS = Array.from({ length: 25 }, (_, i) => String.fromCharCode(65 + i)); // A~Y

        // ---------- DOM 元素 ----------
        const gridContainer = document.getElementById('gridContainer');
        const currentTimeSpan = document.getElementById('currentTimeDisplay');
        const bestTimeSpan = document.getElementById('bestTimeDisplay');
        const restartBtn = document.getElementById('restartBtn');
        const newGameBtn = document.getElementById('newGameBtn');

        // ---------- 游戏核心状态 ----------
        let currentItems = [];       // 当前网格中的字母顺序（已打乱）
        let expectedIndex = 0;       // 下一个应点击的字母在 ALPHABETS 中的索引 (0~24)
        let gameCompleted = false;
        let timerRunning = false;
        let startTime = 0;
        let timerInterval = null;
        let currentElapsedSeconds = 0;
        let bestTime = null;         // 最佳成绩（秒）

        // ---------- Web Audio ----------
        let audioCtx = null;
        function getAudioContext() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            return audioCtx;
        }
        async function playBeep() {
            try {
                const ctx = getAudioContext();
                if (ctx.state === 'suspended') await ctx.resume();
                const now = ctx.currentTime;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.value = 880;
                gain.gain.value = 0.25;
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(now + 0.12);
            } catch(e) { console.warn(e); }
        }
        async function playCelebration() {
            try {
                const ctx = getAudioContext();
                if (ctx.state === 'suspended') await ctx.resume();
                const now = ctx.currentTime;
                const notes = [523.25, 659.25, 783.99];
                for (let i = 0; i < notes.length; i++) {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = notes[i];
                    gain.gain.value = 0.2;
                    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.25 + i * 0.12);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(now + i * 0.12);
                    osc.stop(now + i * 0.12 + 0.2);
                }
                const oscLast = ctx.createOscillator();
                const gainLast = ctx.createGain();
                oscLast.type = 'triangle';
                oscLast.frequency.value = 1046.5;
                gainLast.gain.value = 0.12;
                gainLast.gain.exponentialRampToValueAtTime(0.0001, now + 0.55);
                oscLast.connect(gainLast);
                gainLast.connect(ctx.destination);
                oscLast.start(now + 0.4);
                oscLast.stop(now + 0.7);
            } catch(e) { console.warn(e); }
        }

        // ---------- 辅助函数 ----------
        function updateTimerDisplay(seconds) {
            currentTimeSpan.textContent = seconds.toFixed(2);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            timerRunning = false;
        }

        function startTimer() {
            if (timerInterval) stopTimer();
            startTime = performance.now();
            timerRunning = true;
            timerInterval = setInterval(() => {
                if (!timerRunning || gameCompleted) return;
                const elapsed = (performance.now() - startTime) / 1000;
                currentElapsedSeconds = elapsed;
                updateTimerDisplay(elapsed);
            }, 30);
        }

        // 更新最佳成绩显示
        function updateBestDisplay() {
            const stored = localStorage.getItem('alphabet_best_time');
            if (stored !== null && !isNaN(parseFloat(stored))) {
                bestTime = parseFloat(stored);
                bestTimeSpan.textContent = bestTime.toFixed(2) + 's';
            } else {
                bestTime = null;
                bestTimeSpan.textContent = '——';
            }
        }

        function finishGame() {
            if (gameCompleted) return;
            gameCompleted = true;
            if (timerRunning) stopTimer();
            const finalSeconds = currentElapsedSeconds;
            playCelebration();

            let isNewRecord = false;
            if (bestTime === null || finalSeconds < bestTime) {
                isNewRecord = true;
                bestTime = finalSeconds;
                localStorage.setItem('alphabet_best_time', bestTime.toFixed(3));
                updateBestDisplay();
            }

            let message = `🎉 完成挑战！\n⏱️ 用时：${finalSeconds.toFixed(2)} 秒`;
            if (isNewRecord) message += `\n✨ 新纪录！ ✨`;
            else if (bestTime !== null) message += `\n📌 最佳纪录：${bestTime.toFixed(2)} 秒`;
            alert(message);
        }

        // 正确点击处理
        function handleCorrectClick(cardElement, clickedLetter) {
            cardElement.classList.add('card-correct');
            setTimeout(() => cardElement.classList.remove('card-correct'), 150);
            playBeep();
            expectedIndex++;
            if (expectedIndex === ALPHABETS.length) {
                finishGame();
            }
        }

        // 网格点击事件
        function onGridClick(e) {
            let target = e.target.closest('.card');
            if (!target) return;
            if (gameCompleted) return;

            const val = target.getAttribute('data-value');
            if (!val) return;

            // 期望的字母
            const expectedLetter = ALPHABETS[expectedIndex];
            if (val !== expectedLetter) return; // 错误无响应

            // 正确：如果还没开始计时且是第一个字母，启动计时
            if (!timerRunning && expectedIndex === 0) {
                startTimer();
            }
            handleCorrectClick(target, val);
        }

        // 生成随机排列的字母数组
        function shuffleArray(arr) {
            const copy = [...arr];
            for (let i = copy.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [copy[i], copy[j]] = [copy[j], copy[i]];
            }
            return copy;
        }

        function generateRandomItems() {
            return shuffleArray(ALPHABETS);
        }

        // 渲染网格
        function renderGrid() {
            if (!gridContainer) return;
            gridContainer.innerHTML = '';
            for (let i = 0; i < currentItems.length; i++) {
                const letter = currentItems[i];
                const card = document.createElement('div');
                card.className = 'card';
                card.textContent = letter;
                card.setAttribute('data-value', letter);
                gridContainer.appendChild(card);
            }
        }

        // 重置游戏状态（保留布局或重新洗牌）
        function resetGameState(keepLayout = true) {
            stopTimer();
            timerRunning = false;
            gameCompleted = false;
            expectedIndex = 0;
            currentElapsedSeconds = 0;
            updateTimerDisplay(0);
            if (!keepLayout) {
                currentItems = generateRandomItems();
                renderGrid();
            }
        }

        // 重新开始：保留当前布局，重置进度
        function restartGame() {
            resetGameState(true);
        }

        // 新游戏：完全洗牌
        function newGame() {
            currentItems = generateRandomItems();
            renderGrid();
            resetGameState(false);
        }

        // 初始化
        function initGame() {
            updateBestDisplay();
            currentItems = generateRandomItems();
            renderGrid();
            timerRunning = false;
            gameCompleted = false;
            expectedIndex = 0;
            currentElapsedSeconds = 0;
            updateTimerDisplay(0);
        }

        function bindEvents() {
            gridContainer.addEventListener('click', onGridClick);
            restartBtn.addEventListener('click', restartGame);
            newGameBtn.addEventListener('click', newGame);
        }

        // 预解锁音频（首次触摸）
        function unlockAudioOnFirstTouch() {
            const handler = async () => {
                if (audioCtx && audioCtx.state === 'suspended') await audioCtx.resume();
                else if (!audioCtx) {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    if (ctx.state === 'suspended') await ctx.resume();
                    audioCtx = ctx;
                    if (audioCtx.state === 'running') await audioCtx.suspend();
                }
                document.body.removeEventListener('touchstart', handler);
                document.body.removeEventListener('mousedown', handler);
            };
            document.body.addEventListener('touchstart', handler, { once: true });
            document.body.addEventListener('mousedown', handler, { once: true });
        }

        initGame();
        bindEvents();
        unlockAudioOnFirstTouch();
    })();
</script>
</body>
</html>
